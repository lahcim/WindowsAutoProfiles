name: Build release package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version, e.g. 1.1.0
        required: true
        type: string
      create_release:
        description: Create or update a GitHub Release with the artifacts
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Build installer artifacts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Ensure Pester 3 is available
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $pester = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -eq [version]'3.4.0' } |
            Select-Object -First 1

          if (-not $pester) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null
            Install-Module Pester -RequiredVersion 3.4.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run regression tests
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester -RequiredVersion 3.4.0 -ErrorAction Stop
          $result = Invoke-Pester -Script @('.\tests\WindowsAutoProfiles.Tests.ps1', '.\tests\CapturePowerShell51.Tests.ps1') -PassThru
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) regression test(s) failed."
          }

      - name: Install WiX Toolset
        shell: powershell
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build ZIP and MSI
        shell: powershell
        run: |
          .\packaging\Build-WapRelease.ps1 -Version '${{ inputs.version }}' -RequireMsi

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: WindowsAutoProfiles-${{ inputs.version }}
          path: artifacts/release/WindowsAutoProfiles-${{ inputs.version }}.*
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: ${{ inputs.create_release }}
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ inputs.version }}'
          $tag = "v$version"
          $artifacts = @(Get-ChildItem -Path 'artifacts/release/WindowsAutoProfiles-*' -File | Select-Object -ExpandProperty FullName)
          if (-not $artifacts.Count) {
            throw 'No release artifacts were found.'
          }
          $releaseArgs = @('release', 'create', $tag) + $artifacts + @('--title', "WindowsAutoProfiles $version", '--notes', "WindowsAutoProfiles $version release artifacts.")
          if ('${{ inputs.prerelease }}' -eq 'true') {
            $releaseArgs += '--prerelease'
          }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh @(@('release', 'upload', $tag) + $artifacts + @('--clobber'))
          }
          else {
            & gh @releaseArgs
          }
